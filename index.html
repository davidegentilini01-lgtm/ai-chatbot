<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jen AI</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
#header {
  padding: 12px;
  text-align: center;
  font-weight: bold;
  border-bottom: 1px solid #222;
}

/* CHAT */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* MESSAGGI */
.message {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.4;
  word-wrap: break-word;
}

.user {
  background: #25d366;
  color: black;
  align-self: flex-end;
}

.bot {
  background: #1c1c1c;
  color: white;
  align-self: flex-start;
}

/* INPUT */
#inputBox {
  display: flex;
  padding: 8px;
  background: #000;
  border-top: 1px solid #222;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
  background: #1c1c1c;
  color: white;
}

button {
  margin-left: 8px;
  padding: 10px 16px;
  border-radius: 20px;
  border: none;
  background: #25d366;
  color: black;
  font-weight: bold;
}

/* SCROLL */
#chat::-webkit-scrollbar {
  width: 4px;
}
#chat::-webkit-scrollbar-thumb {
  background: #333;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="header">🤖 Jen AI</div>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Scrivi un messaggio..." />
  <button onclick="send()">Invia</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const loading = document.createElement("div");
  loading.className = "message bot";
  loading.innerText = "Sta scrivendo...";
  chat.appendChild(loading);

  try {
    const res = await fetch("https://ai-chatbot-dboc.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    loading.remove();
    addMessage(data.reply || "Errore", "bot");

  } catch (err) {
    loading.remove();
    addMessage("Errore di connessione", "bot");
  }
}

input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
