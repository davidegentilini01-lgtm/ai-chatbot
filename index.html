<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JenGPT</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  font-family: system-ui, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  height: 100vh;
}

.container {
  width: 100%;
  max-width: 700px;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* CHAT */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* MESSAGGI */
.msg {
  max-width: 85%;
  padding: 14px;
  border-radius: 12px;
  line-height: 1.5;
}

.user {
  align-self: flex-end;
  background: #25d366;
  color: black;
}

.bot {
  align-self: flex-start;
  background: #1a1a1a;
}

/* INPUT */
.input-box {
  border-top: 1px solid #222;
  padding: 10px;
}

.input-inner {
  display: flex;
  background: #1a1a1a;
  border-radius: 20px;
  padding: 8px;
}

textarea {
  flex: 1;
  background: transparent;
  border: none;
  color: white;
  resize: none;
  outline: none;
  padding: 10px;
}

button {
  background: white;
  border: none;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <div id="chat" class="chat"></div>

  <div class="input-box">
    <div class="input-inner">
      <textarea id="input" rows="1" placeholder="Scrivi..."></textarea>
      <button onclick="send()">↑</button>
    </div>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function add(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  add(text, "user");
  input.value = "";

  const bot = add("", "bot");

  try {
    const res = await fetch("https://ai-chatbot-dboc.onrender.com/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    let i = 0;
    const t = data.reply;

    function type() {
      if (i < t.length) {
        bot.textContent += t[i++];
        setTimeout(type, 8);
      }
    }
    type();

  } catch {
    bot.textContent = "Errore";
  }
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
