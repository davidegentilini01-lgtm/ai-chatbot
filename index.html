<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Jen AI</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#chat {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.message {
  padding: 12px 16px;
  border-radius: 12px;
  max-width: 70%;
  line-height: 1.4;
  word-wrap: break-word;
}

.user {
  background: #2563eb;
  align-self: flex-end;
}

.bot {
  background: #1e293b;
  align-self: flex-start;
}

#inputBox {
  display: flex;
  padding: 10px;
  background: #020617;
  border-top: 1px solid #1e293b;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  outline: none;
  background: #0f172a;
  color: white;
}

button {
  margin-left: 10px;
  padding: 12px 20px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #16a34a;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Scrivi qualcosa..." />
  <button onclick="send()">Invia</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const loading = document.createElement("div");
  loading.className = "message bot";
  loading.innerText = "Sto pensando...";
  chat.appendChild(loading);

  try {
    const res = await fetch("https://ai-chatbot-dboc.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    loading.remove();
    addMessage(data.reply || "Errore", "bot");

  } catch (err) {
    loading.remove();
    addMessage("Errore di connessione", "bot");
  }
}

// INVIO CON ENTER
input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    send();
  }
});
</script>

</body>
</html>
