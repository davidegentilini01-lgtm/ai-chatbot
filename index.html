<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Jen AI</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #020617);
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CONTAINER */
#app {
  width: 100%;
  max-width: 800px;
  height: 95vh;
  display: flex;
  flex-direction: column;
  background: #020617;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

/* HEADER */
#header {
  padding: 15px;
  background: #020617;
  border-bottom: 1px solid #1e293b;
  text-align: center;
  font-weight: bold;
  letter-spacing: 1px;
}

/* CHAT */
#chat {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* MESSAGGI */
.message {
  padding: 12px 16px;
  border-radius: 12px;
  max-width: 70%;
  animation: fadeIn 0.3s ease;
}

.user {
  background: #2563eb;
  align-self: flex-end;
}

.bot {
  background: #1e293b;
  align-self: flex-start;
}

/* INPUT */
#inputBox {
  display: flex;
  padding: 10px;
  background: #020617;
  border-top: 1px solid #1e293b;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #0f172a;
  color: white;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 12px 18px;
  background: linear-gradient(45deg, #22c55e, #16a34a);
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  opacity: 0.9;
}

/* ANIMAZIONE */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(5px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* SCROLLBAR */
#chat::-webkit-scrollbar {
  width: 6px;
}

#chat::-webkit-scrollbar-thumb {
  background: #1e293b;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="app">

  <div id="header">🤖 Jen AI</div>

  <div id="chat"></div>

  <div id="inputBox">
    <input id="input" placeholder="Scrivi qualcosa..." />
    <button onclick="send()">Invia</button>
  </div>

</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const loading = document.createElement("div");
  loading.className = "message bot";
  loading.innerText = "Sto pensando...";
  chat.appendChild(loading);

  try {
    const res = await fetch("https://ai-chatbot-dboc.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    loading.remove();
    addMessage(data.reply || "Errore", "bot");

  } catch (err) {
    loading.remove();
    addMessage("Errore di connessione", "bot");
  }
}

input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
